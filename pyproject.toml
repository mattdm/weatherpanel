[tool.pytest.ini_options]
testpaths = ["tests"]
# src/ modules tested on host; root dir excluded to avoid code.py
# shadowing Python's stdlib 'code' module
pythonpath = ["src"]

[tool.ruff]
src = ["src", "tests"]
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W"]
# E501: line length — impractical for the long displayio constructor calls
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
# code.py: gc.collect() before imports is intentional for CircuitPython memory
"code.py" = ["E402", "F821"]
