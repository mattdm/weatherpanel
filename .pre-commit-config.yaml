repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff
        entry: ruff check --fix
        language: system
        files: \.py$
        stages: [pre-commit, pre-merge-commit]

      - id: pytest
        name: pytest
        entry: python -m pytest
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit, pre-merge-commit]
